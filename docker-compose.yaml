# Supabase Vault — Coolify deployment
#
# Port handling: NO host ports are published here. Coolify's Traefik proxy
# routes a domain to the `frontend` service via the SERVICE_FQDN_FRONTEND_80
# magic variable below, so there is nothing to conflict with other apps.
#
# Networking is left to Coolify: it places both services on the project
# network (so the frontend's nginx still reaches `backend` by name) AND
# attaches the public-facing frontend to its Traefik proxy network. We do
# NOT define a custom network here — doing so kept the frontend off the
# proxy network and made Traefik return 503/504.

services:

  backend:
    build: ./backend
    restart: unless-stopped
    # Keep the backend internal-only: traefik.enable=false stops Coolify's
    # proxy from assigning it a public domain. nginx reaches it by service
    # name (backend:3000) over the project network.
    labels:
      - traefik.enable=false
    environment:
      PORT: 3000
      # Set this to your master password so the cron runs automatically
      # even after a server restart (without needing to unlock the UI first).
      # Leave blank if you prefer to unlock manually each session.
      MASTER_PASSWORD: ${MASTER_PASSWORD:-}
    volumes:
      # Persist vault data across container rebuilds
      - vault_data:/app/data
    expose:
      - "3000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Coolify magic variable: generates a domain (or uses the one you set
      # in the UI) and wires up Traefik to route it to this service's port 80.
      - SERVICE_FQDN_FRONTEND_80
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  vault_data:
